version: '3.8'

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:18
    container_name: lab2-postgres-1
    restart: no
    networks:
      - app-network
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: ${DATABASE_USERNAME:-User}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-test}
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "log_statement=all"]
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-User} -d hotel"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  jdbc_app:
    build: .
    container_name: jdbc_app
    restart: no
    networks:
      - app-network
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/hotel
      DATABASE_USERNAME: ${DATABASE_USERNAME:-User}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-test}
      APP_DATABASE_SCHEMA: public
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4096M
    tmpfs:
      - /tmp